<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="enghridoy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>enghridoy</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f6f7f8;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .boot-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #f6f7f8 0%, #f0f2f4 100%);
      z-index: 9999;
    }

    .boot-splash__content {
      width: min(680px, calc(100vw - 48px));
      text-align: center;
      color: #111418;
    }

    .boot-splash__title {
      margin: 0;
      font-size: clamp(42px, 7vw, 48px);
      font-weight: 800;
      color: #ff8a00;
    }

    .boot-splash__subtitle {
      margin: 12px 0 16px;
      font-size: clamp(16px, 2.5vw, 18px);
      line-height: 1.5;
    }

    .boot-splash__bar {
      height: 6px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(240, 242, 244, 0.8);
    }

    .boot-splash__bar::after {
      content: "";
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: #ff8a00;
      animation: boot-splash-slide 1s ease-in-out infinite;
    }

    .boot-splash--hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease-out;
    }

    @keyframes boot-splash-slide {
      0% { transform: translateX(-120%); }
      100% { transform: translateX(300%); }
    }
  </style>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      const splash = document.getElementById("boot-splash");
      if (!splash) return;
      splash.classList.add("boot-splash--hidden");
      window.setTimeout(function () {
        splash.remove();
      }, 160);
    });
  </script>
</head>
<body>
  <div id="boot-splash" class="boot-splash" aria-hidden="true">
    <div class="boot-splash__content">
      <h1 class="boot-splash__title">Hridoy Soft</h1>
      <p class="boot-splash__subtitle">Portfolio crafted with Flutter</p>
      <div class="boot-splash__bar"></div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
